<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">

    <!-- daisy and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <header class="">
        <fieldset class="fieldset mx-auto mt-20 bg-base-200 border-base-300 rounded-box w-xs border p-4">
            <div>
                <img class="mx-auto" src="./assets/github-logo.png" alt="">
                <h2 class="text-2xl font-bold text-center">GitHub Issues Tracker</h2>
                <p class="text-gray-400 text-center">Sign in to manage your issues</p>

            </div>
            <label class="label text-black">Username</label>
            <input id="user-input" type="email" class="input" value="admin" placeholder="Enter Username" />

            <label class="label text-black">Password</label>
            <input id="pass-input" type="password" class="input" value="admin123" placeholder="Enter Password" />

            <button onclick="signBtn()" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
    </header>


    <script src="./login.js"></script>

</body>

</html>
