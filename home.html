<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="style.css">

    <!-- daisy and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-gray-100">

    <header>
        <!-- Navbar -->
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">

                <a class="btn btn-ghost text-xl"> <img class="w-6" src="./assets/github-logo.png" alt=""> GitHub Issues
                    Tracker</a>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                <div class="dropdown dropdown-end">
                    <div class="">
                        <button class="btn btn-primary"> + New Issue</button>
                    </div>
                </div>
            </div>
        </div>

        <section class="w-10/12 mx-auto mt-8 bg-white p-3 rounded-lg space-x-1.5 mb-2.5">
            <button onclick="loadBtn('all')" id="btn-all" class="btn "> All</button>
            <button onclick="loadBtn('open')" id="btn-open" class="btn ">Open</button>
            <button onclick="loadBtn('close')" id="btn-close" class="btn ">closed</button>
        </section>


        <section class=" bg-amber-50 w-10/12 mx-auto">

            <main class=" bg-white  flex justify-between items-center mb-3.5 p-2">
                <div class="left">
                    <div class="flex items-center gap-2">
                        <img src="./assets/Aperture.png" alt="">
                        <div>
                            <h3 class="text-1xl font-bold">50 Issues</h3>
                            <p class="text-gray-400">Track and manage your project issues</p>
                        </div>
                    </div>
                </div>

                <div class="right flex items-center gap-2.5">
                    <div class="flex items-center gap-1.5">
                        <div class="w-2.5 h-2.5 bg-green-500 rounded-full"></div>
                        <p>Open</p>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <div class="w-2.5 h-2.5 bg-purple-500 rounded-full"></div>
                        <p>Closed</p>
                    </div>
                </div>
            </main>

            <section id="issue-container" class="  grid-cols-1 space-y-2.5 sm:grid grid-cols-4 gap-2.5">

            </section>

        </section>



    </header>
    <section>

        <dialog id="my_modal" class="modal">
            <div class="modal-box">
                <div id="detail-container" class="space-y-3">
                   
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class=" btn btn-primary  border-0">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </section>


    <script src="./login.js"></script>

</body>

</html>
